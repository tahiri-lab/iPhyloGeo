name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 apps

  unit:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest -m unit --cov=apps --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration:
    runs-on: ubuntu-latest
    name: Integration Tests
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      mongo:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 27018:27017
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write CI .env
        run: |
          cat > .env << 'EOF'
          APP_ENV=dev
          HOST=localhost
          MONGO_URI=mongodb://localhost:27018
          DB_NAME=iPhyloGeo
          URL=http://127.0.0.1
          PORT=8050
          TEMP_RESULT_TTL_SECONDS=7200
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Run integration tests
        env:
          PYTHONPATH: .
        run: pytest -m integration

  e2e:
    runs-on: ubuntu-latest
    name: E2E Smoke
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      mongo:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 27018:27017
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write CI .env
        run: |
          cat > .env << 'EOF'
          APP_ENV=dev
          HOST=localhost
          MONGO_URI=mongodb://localhost:27018
          DB_NAME=iPhyloGeo
          URL=http://127.0.0.1
          PORT=8050
          TEMP_RESULT_TTL_SECONDS=7200
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Run e2e smoke tests
        env:
          PYTHONPATH: .
        run: pytest tests/e2e -m e2e
